name: notes_app
description: "Une application pour la gestion des notes universitaires."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  pdf: ^3.10.8
  path_provider: ^2.1.5
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  open_file: ^3.3.2
  easy_localization: ^3.0.8
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: ^2.4.0 # Ajouté à nouveau pour permettre la suppression

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/applogo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/developpeur.jpg
    - assets/applogo.png
    - assets/applogo_foreground.png
    - assets/translations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
